name: Deploy to IPFS

on:
  push:
    branches: [ main ]

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: production
      url: https://ariiellus.eth.limo

    steps:
    - uses: actions/checkout@v4

    - name: Setup Node
      uses: actions/setup-node@v4
      with:
        node-version: "20"
        cache: "npm"

    - name: Install dependencies
      run: |
        npm ci

    - name: Build site
      run: |
        npm run build

    - name: Deploy to IPFS
      env:
        SSH_PRIVATE_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
        SSH_USER: ${{ secrets.SSH_USER }}
        IPFS_SERVER_HOST: ${{ secrets.IPFS_SERVER_HOST }}
        SSH_PORT: ${{ secrets.SSH_PORT }}
        DEPLOY_PATH: ${{ secrets.DEPLOY_PATH }}
        IPNS_KEY_NAME: ${{ secrets.IPNS_KEY_NAME }}
      run: |
        # Setup SSH
        mkdir -p ~/.ssh
        echo "$SSH_PRIVATE_KEY" > ~/.ssh/id_ed25519
        chmod 600 ~/.ssh/id_ed25519
        ssh-keyscan -p $SSH_PORT -H $IPFS_SERVER_HOST >> ~/.ssh/known_hosts

        # Clean deploy path to avoid file/dir collisions
        ssh -p $SSH_PORT $SSH_USER@$IPFS_SERVER_HOST "rm -rf $DEPLOY_PATH/*"

        # Copy dist folder to server
        scp -P $SSH_PORT -r dist $SSH_USER@$IPFS_SERVER_HOST:$DEPLOY_PATH/

        # Deploy to IPFS and verify IPNS points to the new CID.
        ssh -p $SSH_PORT $SSH_USER@$IPFS_SERVER_HOST "
          set -e
          cd $DEPLOY_PATH

          HASH=\$(ipfs add -r . -Q)
          ipfs pin add \$HASH

          IPNS_NAME=\$(ipfs key list -l | awk '\$2 == \"$IPNS_KEY_NAME\" {print \$1}')
          if [ -z \"\$IPNS_NAME\" ]; then
            echo 'IPNS key not found on server'
            exit 1
          fi

          ipfs name publish --key=$IPNS_KEY_NAME \$HASH

          # Give the local node a few chances to update routing records.
          attempt=1
          max_attempts=8
          sleep_seconds=5
          while [ \$attempt -le \$max_attempts ]; do
            RESOLVED=\$(ipfs name resolve /ipns/\$IPNS_NAME 2>/dev/null || true)
            if [ \"\$RESOLVED\" = \"/ipfs/\$HASH\" ]; then
              echo \"Verified IPNS -> \$RESOLVED\"
              exit 0
            fi
            echo \"Attempt \$attempt/\$max_attempts: expected /ipfs/\$HASH, got '\$RESOLVED'\" 
            attempt=\$((attempt + 1))
            sleep \$sleep_seconds
          done

          echo 'IPNS verification failed'
          exit 1
        "
